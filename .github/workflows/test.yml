name: Go Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Tests
    runs-on: ${{ matrix.os }}
    
    strategy:
      matrix:
        os: [ubuntu-latest]
        go-version: ['1.21']
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}
    
    - name: Install GCC (Ubuntu)
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc
    
    - name: Download dependencies
      run: |
        go mod download
        go mod verify
    
    - name: Run all tests with coverage
      run: go test -v -coverprofile=coverage.txt -covermode=atomic ./internal/buffer/... ./internal/config/... ./internal/watcher/...
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.txt
        flags: unittests
        name: codecov-umbrella
